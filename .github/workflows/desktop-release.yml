name: Desktop release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${package_version}"
          test "$(node -p "require('./apps/bootstrap-installer/package.json').version")" = "${package_version}"
          test "$(node -p "require('./apps/bootstrap-installer/src-tauri/tauri.conf.json').version")" = "${package_version}"
          grep -q "^version = \"${package_version}\"$" apps/bootstrap-installer/src-tauri/Cargo.toml
      - run: npm run lint
      - name: Run portable unit tests
        run: npm run test:ci
      - run: npm run build
      - run: npm run build:electron

  setup-macos:
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/bootstrap-installer/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - run: npm ci --prefix apps/bootstrap-installer
      - name: Build the lightweight Apple silicon Setup DMG
        run: |
          npm run build:ui --prefix apps/bootstrap-installer
          npm run tauri --prefix apps/bootstrap-installer -- build --bundles dmg --target aarch64-apple-darwin
          setup_dmg="$(find apps/bootstrap-installer/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' -type f -print -quit)"
          test -n "${setup_dmg}"
          bash apps/bootstrap-installer/macos/finalize-dmg.sh "${setup_dmg}"
      - name: Prepare stable latest-download filename
        shell: bash
        run: |
          mkdir -p release-assets
          setup_dmg="$(find apps/bootstrap-installer/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' -type f -print -quit)"
          test -n "${setup_dmg}"
          cp "${setup_dmg}" release-assets/LABO-AI-Setup-arm64.dmg
          cp apps/bootstrap-installer/src-tauri/target/aarch64-apple-darwin/release/labo-ai-setup release-assets/LABO-AI-Setup-arm64-helper
          shasum -a 256 release-assets/LABO-AI-Setup-arm64-helper > release-assets/LABO-AI-Setup-arm64-helper.sha256
          cp scripts/install-labo-ai-macos.sh release-assets/install-labo-ai-macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-setup-macos-arm64
          path: |
            release-assets/LABO-AI-Setup-arm64.dmg
            release-assets/LABO-AI-Setup-arm64-helper
            release-assets/LABO-AI-Setup-arm64-helper.sha256
            release-assets/install-labo-ai-macos.sh
          if-no-files-found: error
          retention-days: 14

  setup-windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/bootstrap-installer/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci --prefix apps/bootstrap-installer
      - name: Build the lightweight Windows x64 Setup installer
        run: npm run build:win --prefix apps/bootstrap-installer
      - name: Prepare stable latest-download filename
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $setup = Get-ChildItem apps/bootstrap-installer/src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          if (-not $setup) { throw "LABO AI Setup NSIS installer was not produced" }
          Copy-Item $setup.FullName release-assets/LABO-AI-Setup-x64.exe
          Copy-Item apps/bootstrap-installer/src-tauri/target/release/labo-ai-setup.exe release-assets/LABO-AI-Setup-x64-helper.exe
          $hash = (Get-FileHash release-assets/LABO-AI-Setup-x64-helper.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  LABO-AI-Setup-x64-helper.exe" | Set-Content -NoNewline release-assets/LABO-AI-Setup-x64-helper.exe.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-setup-windows-x64
          path: |
            release-assets/LABO-AI-Setup-x64.exe
            release-assets/LABO-AI-Setup-x64-helper.exe
            release-assets/LABO-AI-Setup-x64-helper.exe.sha256
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: [setup-macos, setup-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-setup-*
          path: release-assets
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/* --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "LABO AI ${GITHUB_REF_NAME}" \
              --generate-notes \
              --verify-tag
          fi
      - name: Keep the latest 10 desktop releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -t stale_tags < <(gh release list --repo "${GITHUB_REPOSITORY}" --limit 100 \
            --json tagName,publishedAt \
            --jq '[.[] | select(.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))] | sort_by(.publishedAt) | reverse | .[10:] | .[].tagName')
          for tag in "${stale_tags[@]}"; do
            gh release delete "${tag}" --repo "${GITHUB_REPOSITORY}" --cleanup-tag --yes
          done
