name: Desktop release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${package_version}"
      - run: npm run lint
      - name: Run portable unit tests
        run: npm run test:ci
      - run: npm run build
      - run: npm run build:electron

  macos:
    needs: validate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build Apple silicon DMG and ZIP
        run: npm run package:mac -- --arm64
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-arm64
          path: |
            release/*.dmg
            release/*-mac.zip
          if-no-files-found: error
          retention-days: 14

  windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build Windows x64 installer and ZIP
        run: npm run package:win -- --x64
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-x64
          path: |
            release/*.exe
            release/*-win.zip
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/* --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "LABO AI ${GITHUB_REF_NAME}" \
              --generate-notes \
              --verify-tag
          fi
      - name: Keep the latest 10 desktop releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mapfile -t stale_tags < <(gh release list --repo "${GITHUB_REPOSITORY}" --limit 100 \
            --json tagName,publishedAt \
            --jq '[.[] | select(.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))] | sort_by(.publishedAt) | reverse | .[10:] | .[].tagName')
          for tag in "${stale_tags[@]}"; do
            gh release delete "${tag}" --repo "${GITHUB_REPOSITORY}" --cleanup-tag --yes
          done
